<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dictionary API</title>
        <link rel="stylesheet" href="../src/output.css">
    </head>
    <body class="min-h-screen flex justify-center">
        <div class="max-w-2xl w-full">
            <h1>Dictionary Lookup</h1>

            <div class="row justify-center">
                <label for="word">Enter a word:</label>
                <input id="word" type="text">
                <span id="error"></span>
            </div>

            <div class="row justify-center" id="response-error"></div>

            <div class="row">
                <table id="studentTable">
                    <thead>
                    <tr>
                        <th id="word-header" colspan="3">Word:</th>
                    </tr>
                    <th id="pronunciation-header" colspan="3">
                        <span id="pronunciation-text">Pronunciation: -</span>
                        <button id="play-audio" class="audio-btn hidden">▶</button>
                    </th>
                    <tr>
                        <th>Part of Speech</th>
                        <th>Definition</th>
                        <th>Example</th>
                    </tr>
                    </thead>
                    <tbody id="definitions">
                    <!-- Definitions information will be inserted here -->
                    </tbody>
                </table>
            </div>

            <div class="row">
                <button id="lookup">Lookup</button>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
